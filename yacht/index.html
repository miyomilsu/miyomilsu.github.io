<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yacht Dice</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- 메뉴 -->
  <div id="menu-screen" class="screen">
    <h1>Yacht Dice</h1>
    <p class="subtitle">vs AI</p>
    <div class="menu-buttons">
      <button id="btn-standard" class="menu-btn standard">Standard<span class="mode-desc">12 categories</span></button>
      <button id="btn-trickal" class="menu-btn trickal">Trickal<span class="mode-desc">8 categories + Erfin</span></button>
    </div>
    <div id="menu-records" class="records hidden"></div>
    <button id="btn-history" class="history-link">Game History</button>
  </div>

  <!-- 로딩 -->
  <div id="loading-screen" class="screen hidden">
    <div class="spinner"></div>
    <p id="loading-text">Loading...</p>
  </div>

  <!-- 게임 -->
  <div id="game-screen" class="screen hidden">
    <div class="game-header">
      <span id="game-mode"></span>
      <span id="round-info"></span>
      <span id="reroll-info"></span>
    </div>

    <div id="ai-log" class="ai-log hidden"></div>

    <div id="dice-container" class="dice-container"></div>

    <div class="action-buttons">
      <button id="btn-reroll" class="action-btn reroll-btn">Reroll Selected</button>
      <button id="btn-assign" class="action-btn assign-btn">Assign</button>
    </div>

    <div id="category-select" class="category-select hidden"></div>

    <table class="scoreboard">
      <thead>
        <tr><th></th><th>You</th><th>AI</th></tr>
      </thead>
      <tbody id="scoreboard-body"></tbody>
    </table>
  </div>

  <!-- 게임 종료 -->
  <div id="over-screen" class="screen hidden">
    <h2 id="result-title"></h2>
    <p id="result-score" class="result-score"></p>
    <p id="result-record" class="result-record"></p>

    <table class="scoreboard">
      <thead>
        <tr><th></th><th>You</th><th>AI</th></tr>
      </thead>
      <tbody id="final-scoreboard-body"></tbody>
    </table>

    <div id="analysis" class="analysis"></div>

    <button id="btn-new-game" class="menu-btn standard">New Game</button>
  </div>

  <!-- 히스토리 -->
  <div id="history-screen" class="screen hidden">
    <div class="screen-header">
      <button id="btn-history-back" class="back-btn">&larr;</button>
      <h2>Game History</h2>
    </div>
    <div id="history-list" class="history-list"></div>
  </div>

  <!-- 상세 보기 -->
  <div id="detail-screen" class="screen hidden">
    <div class="screen-header">
      <button id="btn-detail-back" class="back-btn">&larr;</button>
      <h2 id="detail-title"></h2>
    </div>
    <p id="detail-scores" class="result-score"></p>
    <p id="detail-date" class="detail-date"></p>

    <table class="scoreboard">
      <thead>
        <tr><th></th><th>You</th><th>AI</th></tr>
      </thead>
      <tbody id="detail-scoreboard-body"></tbody>
    </table>

    <div id="detail-analysis" class="analysis"></div>
    <div id="detail-rounds" class="detail-rounds"></div>
  </div>

  <!-- 라운드 분석 -->
  <div id="round-analysis-screen" class="screen hidden">
    <div class="screen-header">
      <button id="btn-ra-back" class="back-btn">&larr;</button>
      <h2 id="ra-title"></h2>
      <span id="ra-score-summary" class="ra-score-summary"></span>
    </div>
    <div class="ra-nav">
      <button id="ra-prev" class="ra-nav-btn">&larr; Prev</button>
      <button id="ra-next" class="ra-nav-btn">Next &rarr;</button>
    </div>
    <div id="ra-panels" class="ra-panels"></div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
